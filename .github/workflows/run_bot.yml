name: Run Forex Bot Hourly

on:
  schedule:
    - cron: '0 * * * *'  # بیدار شدن دقیقاً سر هر ساعت (مثلاً 13:00، 14:00 و...)

  workflow_dispatch:      # فعال ماندن دکمه اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy

      - name: Run Python script
        run: python testprice.py
