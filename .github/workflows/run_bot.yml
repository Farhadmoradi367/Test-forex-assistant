name: Run Forex Bot Hourly

on:
  schedule:
    - cron: '*/5 * * * *'  # بیدار شدن خودکار ربات هر ۵ دقیقه یک‌بار
  workflow_dispatch:      # فعال بودن دکمه اجرای دستی
  

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install requests

    - name: Run Python script
      run: python testprice.py
      
