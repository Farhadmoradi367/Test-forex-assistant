name: Run Forex Bot Hourly

on:
  schedule:
    - cron: '*/15 * * * *'  # بیدار شدن خودکار ربات دقیقاً هر ۱۵ دقیقه یک‌بار
  workflow_dispatch:      # فعال ماندن دکمه اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-state: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy

      - name: Run Python script
        run: python testprice.py
